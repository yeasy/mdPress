name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    # An untidy go.mod used to surface only at release time, where goreleaser's
    # `go mod tidy` before-hook rewrote it mid-run and built the release from a
    # different module graph than CI tested.
    - name: Check go.mod is tidy
      if: matrix.os == 'ubuntu-latest'
      run: go mod tidy -diff

    - name: Run go vet
      run: go vet ./...

    - name: Run tests (with coverage)
      if: matrix.os == 'ubuntu-latest'
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Run tests
      if: matrix.os != 'ubuntu-latest'
      run: go test -v -race ./...

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v6
      with:
        files: coverage.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build binary
      run: go build -v -o mdpress .

    - name: Verify binary
      run: ./mdpress --help

  docker:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build minimal Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        target: minimal
        load: true
        push: false
        # Pass a recognisable VERSION so the smoke test proves the build-arg is
        # wired to the ldflags. Without it the image compiles with the
        # Dockerfile default ("dev") and could not catch a version-stamping
        # regression -- which is how two releases shipped a wrong version.
        build-args: |
          VERSION=ci-test
        tags: mdpress:test-minimal
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify minimal image
      run: |
        set -euo pipefail
        docker run --rm mdpress:test-minimal --help
        got="$(docker run --rm mdpress:test-minimal version --json | jq -re .version)"
        echo "image reports version $got"
        [ "$got" = "ci-test" ] || { echo "::error::VERSION build-arg is not reaching the binary (got '$got')"; exit 1; }

    - name: Build full Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        target: full
        load: true
        push: false
        build-args: |
          VERSION=ci-test
        tags: mdpress:test-full
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify full image
      run: |
        set -euo pipefail
        docker run --rm mdpress:test-full --help
        got="$(docker run --rm mdpress:test-full version --json | jq -re .version)"
        echo "image reports version $got"
        [ "$got" = "ci-test" ] || { echo "::error::VERSION build-arg is not reaching the binary (got '$got')"; exit 1; }

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
