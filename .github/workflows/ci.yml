name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    - name: Run go vet
      run: go vet ./...

    - name: Run tests (with coverage)
      if: matrix.os == 'ubuntu-latest'
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Run tests
      if: matrix.os != 'ubuntu-latest'
      run: go test -v -race ./...

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v6
      with:
        files: coverage.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build binary
      run: go build -v -o mdpress .

    - name: Verify binary
      run: ./mdpress --help

  docker:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Build minimal Docker image
      run: docker build --target minimal -t mdpress:test-minimal .

    - name: Verify minimal image
      run: docker run --rm mdpress:test-minimal --help

    - name: Build full Docker image
      run: docker build --target full -t mdpress:test-full .

    - name: Verify full image
      run: docker run --rm mdpress:test-full --help

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.4
