name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default token: scoped to this repo, enough to create the release
          # (the job declares contents: write).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT: used ONLY for the cross-repo push to yeasy/homebrew-tap.
          TAP_GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version and build time
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          REPO="${{ github.repository }}"
          echo "REPO_LC=${REPO,,}" >> "$GITHUB_OUTPUT"
          # Only stable releases (vMAJOR.MINOR.PATCH) move the :latest/:full
          # tags; prereleases (e.g. v0.8.0-rc1) and out-of-order backport
          # tags must not repoint them.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IS_STABLE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_STABLE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push minimal image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: minimal
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          tags: |
            ghcr.io/${{ steps.version.outputs.REPO_LC }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.IS_STABLE == 'true' && format('ghcr.io/{0}:latest', steps.version.outputs.REPO_LC) || '' }}

      - name: Build and push full image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: full
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          tags: |
            ghcr.io/${{ steps.version.outputs.REPO_LC }}:${{ steps.version.outputs.VERSION }}-full
            ${{ steps.version.outputs.IS_STABLE == 'true' && format('ghcr.io/{0}:full', steps.version.outputs.REPO_LC) || '' }}
