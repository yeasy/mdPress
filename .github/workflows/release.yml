name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Nothing used to compare the pushed tag with the version compiled into the
  # binary, so a tag could be pushed against a tree that still said 0.8.0 and
  # the release would happily ship it. This job fails the release before any
  # artifact is built.
  preflight:
    name: Check tag matches the source version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'

      - name: Tag must match cmd/root.go defaultVersion
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION="$(sed -n 's/^const defaultVersion = "\(.*\)"$/\1/p' cmd/root.go | head -n1)"
          echo "tag=$VERSION source=$SOURCE_VERSION"
          if [ "$VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::tag v$VERSION was pushed but cmd/root.go says $SOURCE_VERSION -- run 'make bump VERSION=$VERSION' first"
            exit 1
          fi

      - name: Every version location must agree (README, CHANGELOG, docs)
        run: go test ./cmd/ -run 'TestRepoVersionsAreConsistent|TestChangelogLinksNewestRelease' -count=1

  goreleaser:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
      packages: write
      # Keyless cosign signing and build-provenance attestation both need an
      # OIDC token; attestations: write publishes the provenance statement.
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'

      # goreleaser shells out to these; without them the sboms:/signs: blocks
      # in .goreleaser.yml fail the run.
      - name: Install syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign (checksum signing)
        uses: sigstore/cosign-installer@v4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default token: scoped to this repo, enough to create the release
          # (the job declares contents: write).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT: used ONLY for the cross-repo push to yeasy/homebrew-tap.
          TAP_GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.apk

  # v0.7.15 and v0.8.0 both published binaries that reported "<tag>+dirty" while
  # every job stayed green, because nothing in the pipeline ever ran a released
  # artifact. This job downloads what was actually published and runs it.
  verify-artifacts:
    name: Published artifacts report the tag
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download the published Linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" --dir published \
            --pattern 'mdpress_*_linux_amd64.tar.gz' \
            --pattern 'mdpress_*_linux_amd64.deb' \
            --pattern 'checksums.txt'
          ls -la published

      - name: Verify the published checksums
        working-directory: published
        run: |
          set -euo pipefail
          # Check only the lines for the files downloaded here; checksums.txt
          # covers every platform.
          grep -E ' +mdpress_.*_linux_amd64\.(tar\.gz|deb)$' checksums.txt > subset.txt
          cat subset.txt
          sha256sum -c subset.txt

      - name: Archive must report the release version
        run: ./scripts/verify-release-version.sh "${GITHUB_REF_NAME#v}" published/mdpress_*_linux_amd64.tar.gz

      - name: Installed .deb must report the release version
        run: |
          set -euo pipefail
          sudo dpkg -i published/mdpress_*_linux_amd64.deb
          ./scripts/verify-release-version.sh "${GITHUB_REF_NAME#v}" "$(command -v mdpress)"

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version and build time
        id: version
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          REPO="${{ github.repository }}"
          echo "REPO_LC=${REPO,,}" >> "$GITHUB_OUTPUT"
          # Only stable releases (vMAJOR.MINOR.PATCH) move the :latest/:full
          # tags; prereleases (e.g. v0.8.0-rc1) and out-of-order backport
          # tags must not repoint them.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IS_STABLE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_STABLE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push minimal image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: minimal
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          tags: |
            ghcr.io/${{ steps.version.outputs.REPO_LC }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.IS_STABLE == 'true' && format('ghcr.io/{0}:latest', steps.version.outputs.REPO_LC) || '' }}

      - name: Build and push full image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: full
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          tags: |
            ghcr.io/${{ steps.version.outputs.REPO_LC }}:${{ steps.version.outputs.VERSION }}-full
            ${{ steps.version.outputs.IS_STABLE == 'true' && format('ghcr.io/{0}:full', steps.version.outputs.REPO_LC) || '' }}

      # A VERSION build-arg typo would otherwise ship an image calling itself
      # "dev" (the Dockerfile default) with nothing to catch it.
      - name: Pushed images must report the release version
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          for tag in "$VERSION" "$VERSION-full"; do
            image="ghcr.io/${{ steps.version.outputs.REPO_LC }}:$tag"
            got="$(docker run --rm "$image" version --json | jq -re .version)"
            echo "$image reports $got"
            if [ "$got" != "$VERSION" ]; then
              echo "::error::$image reports version '$got', expected '$VERSION'"
              exit 1
            fi
          done
