# mdpress configuration file
# Generated by: mdpress init
# Documentation: https://github.com/yeasy/mdpress

book:
  title: "mdpress User Guide"
  subtitle: "Publish Markdown as Websites, PDFs, and eBooks"
  author: "yeasy"
  version: "1.0.0"
  language: "en-US"
  description: "A guide on using mdpress to publish Markdown books as websites, PDFs, standalone HTML, and EPUB."
  # A styled cover is generated from the metadata above by default.
  # cover:
  #   image: "cover.png"       # use a custom cover image
  #   background: "#102a43"    # override the default cover background color

# Chapters are listed in reading order.
# Paths are relative to this file.
chapters:
  - title: "Preface"
    file: "preface.md"
  - title: "Chapter 1: Quick Start"
    file: "chapter01/README.md"
  - title: "Chapter 2: Advanced Usage"
    file: "chapter02/README.md"

style:
  theme: "technical"       # technical | elegant | minimal
  page_size: "A4"          # A4 | A5 | Letter | Legal | B5
  # code_theme: "github"   # syntax highlighting style for code blocks
  # custom_css: "custom.css"

output:
  filename: "mdpress-guide.pdf"
  toc: true
  toc_max_depth: 2           # Maximum heading level in TOC (1-6, default 2)
  cover: true
  # formats:                 # Optional: build multiple formats at once
  #   - pdf                  # (same as `mdpress build --format pdf,html,site,epub`)
  #   - html
  #   - site
  #   - epub
  # watermark: "DRAFT"       # Optional: add watermark text to PDF pages
  # watermark_opacity: 0.1   # Watermark transparency (0.0-1.0)
  # margin_top: "20mm"       # PDF print margins (mm, cm, in, pt, px)
  # margin_bottom: "20mm"
  # margin_left: "25mm"
  # margin_right: "25mm"
  # generate_bookmarks: true  # Generate PDF bookmarks from headings
  # pdf_timeout: 120          # PDF generation timeout in seconds
