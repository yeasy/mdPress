# Example custom theme file mirroring the built-in "minimal" theme.
name: minimal
page_size: A4
font_family: "-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Noto Sans SC', 'Source Han Sans SC', 'San Francisco', 'Segoe UI', Roboto, sans-serif"
font_size: 10
code_theme: bw
line_height: 1.7
colors:
  text: "#000000"
  background: "#FFFFFF"
  heading: "#000000"
  link: "#0000EE"
  code_bg: "#F6F6F6"
  code_text: "#000000"
  accent: "#1A1A1A"
  border: "#E0E0E0"
margins:
  top: 30.0
  bottom: 30.0
  left: 30.0
  right: 30.0
