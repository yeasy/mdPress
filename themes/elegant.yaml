# Example custom theme file mirroring the built-in "elegant" theme.
name: elegant
page_size: A4
font_family: "'Songti SC', 'STSong', 'Noto Serif CJK SC', 'Source Han Serif SC', 'Georgia', 'Garamond', 'Times New Roman', serif"
font_size: 12
code_theme: github
line_height: 1.8
colors:
  text: "#3E2723"
  background: "#FFFBF0"
  heading: "#1B0000"
  link: "#8B6914"
  code_bg: "#F5F0E6"
  code_text: "#3E2723"
  accent: "#A87B3B"
  border: "#E2D9C8"
margins:
  top: 25.0
  bottom: 25.0
  left: 25.0
  right: 25.0
