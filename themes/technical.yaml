# Example custom theme file. A file at themes/<name>.yaml overrides the
# built-in theme of the same name; see `mdpress themes show technical`.
# These values mirror the built-in "technical" theme.
name: technical
page_size: A4
font_family: "-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', 'Noto Sans SC', 'Source Han Sans SC', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
font_size: 11
code_theme: github
line_height: 1.75
colors:
  text: "#1F2933"
  background: "#FFFFFF"
  heading: "#12344D"
  link: "#1C5A9E"
  code_bg: "#F5F7F9"
  code_text: "#1F2933"
  accent: "#1C5A9E"
  border: "#E4E7EB"
margins:
  top: 20.0
  bottom: 20.0
  left: 20.0
  right: 20.0
