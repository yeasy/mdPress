# mdpress GitLab CI/CD configuration
#
# This pipeline runs lint, test, and build on a single Go 1.26 toolchain.
# It does NOT include the Docker smoke-test job from the GitHub Actions CI
# workflow, and it tests a single Go version (not a matrix).
#
# Requirements:
#   - GitLab Runner with Docker executor
#   - Chromium is NOT required for most tests (PDF mock layer is used)

stages:
  - lint
  - test
  - build

variables:
  GOPATH: "$CI_PROJECT_DIR/.go"
  GOCACHE: "$CI_PROJECT_DIR/.gocache"
  GOLANGCI_LINT_CACHE: "$CI_PROJECT_DIR/.golangci-cache"
  GOFLAGS: "-mod=readonly"

# Cache Go modules, the build cache, and the golangci-lint cache across jobs.
.go-cache: &go-cache
  cache:
    key: "${CI_COMMIT_REF_SLUG}-go"
    paths:
      - .go/pkg/mod/
      - .gocache/
      - .golangci-cache/

# --- Lint ---

lint:
  stage: lint
  image: golangci/golangci-lint:v2.12.2
  <<: *go-cache
  script:
    - golangci-lint run ./...
  allow_failure: false

# --- Test ---

test:go-1.26:
  stage: test
  image: golang:1.26
  <<: *go-cache
  script:
    - go mod download
    - go vet ./...
    - go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
  coverage: '/^total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.txt
    when: always

# --- Build ---

build:
  stage: build
  image: golang:1.26
  <<: *go-cache
  needs:
    - test:go-1.26
  script:
    - go build -v -o mdpress .
    - ./mdpress --help
  artifacts:
    paths:
      - mdpress
    expire_in: 1 week
