version: 2

project_name: mdpress

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mdpress
    main: .
    binary: mdpress
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/yeasy/mdpress/cmd.Version={{ .Version }} -X github.com/yeasy/mdpress/cmd.BuildTime={{ .Date }} -X github.com/yeasy/mdpress/cmd.Commit={{ .Commit }}

archives:
  - id: binaries
    ids:
      - mdpress
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: packages
    ids:
      - mdpress
    package_name: mdpress
    formats:
      - deb
      - rpm
      - apk
    maintainer: "Baohua Yang <yeasy.github.com>"
    homepage: "https://github.com/yeasy/mdpress"
    description: "Markdown publishing CLI for book-style and documentation-style projects"
    license: MIT

source:
  enabled: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

homebrew_casks:
  - name: mdpress
    ids:
      - binaries
    binaries:
      - mdpress
    repository:
      owner: yeasy
      name: homebrew-tap
      # Cross-repo push needs a PAT; the default GITHUB_TOKEN cannot push
      # to another repository. Supplied via TAP_GITHUB_TOKEN in release.yml.
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/yeasy/mdpress"
    description: "Markdown publishing CLI for book-style and documentation-style projects"
    url:
      verified: "github.com/yeasy/mdpress/"
    # Binaries are not notarized yet. Strip the quarantine attribute on
    # install so macOS Gatekeeper does not block the unsigned binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mdpress"]
          end

release:
  github:
    owner: yeasy
    name: mdpress
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
