version: 2

project_name: mdpress

before:
  hooks:
    # -diff reports an untidy go.mod instead of rewriting it. A plain `go mod
    # tidy` here edited go.mod/go.sum after goreleaser had already validated the
    # git state, so releases were built from a module graph that differed from
    # the tag, and the dirty tree stamped two releases as "<tag>+dirty".
    - go mod tidy -diff
    - go test ./...

builds:
  - id: mdpress
    main: .
    binary: mdpress
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/yeasy/mdpress/cmd.Version={{ .Version }} -X github.com/yeasy/mdpress/cmd.BuildTime={{ .Date }} -X github.com/yeasy/mdpress/cmd.Commit={{ .Commit }}

archives:
  - id: binaries
    ids:
      - mdpress
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: packages
    ids:
      - mdpress
    package_name: mdpress
    formats:
      - deb
      - rpm
      - apk
    # Must be an RFC822 address: Debian policy requires it, and lintian rejects
    # a package whose Maintainer field cannot be mailed.
    maintainer: "Baohua Yang <yangbaohua@gmail.com>"
    homepage: "https://github.com/yeasy/mdpress"
    description: "Markdown publishing CLI for book-style and documentation-style projects"
    license: MIT
    section: utils

source:
  enabled: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

# An unsigned checksums.txt was the only trust anchor for both the documented
# `sha256sum -c` recipe and `mdpress upgrade`: anyone able to replace an asset
# could replace the checksums too. The signature over checksums.txt makes that
# tampering detectable, and the SBOMs let dependency scanners ingest a release.
# Both need tools on the runner (see .github/workflows/release.yml).
sboms:
  - id: archive-sboms
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.spdx.json"
  - id: package-sboms
    artifacts: package
    documents:
      - "{{ .ArtifactName }}.sbom.spdx.json"

signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

homebrew_casks:
  - name: mdpress
    ids:
      - binaries
    binaries:
      - mdpress
    repository:
      owner: yeasy
      name: homebrew-tap
      # Cross-repo push needs a PAT; the default GITHUB_TOKEN cannot push
      # to another repository. Supplied via TAP_GITHUB_TOKEN in release.yml.
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/yeasy/mdpress"
    description: "Markdown publishing CLI for book-style and documentation-style projects"
    url:
      verified: "github.com/yeasy/mdpress/"
    # Binaries are not notarized yet. Strip the quarantine attribute on
    # install so macOS Gatekeeper does not block the unsigned binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mdpress"]
          end

release:
  github:
    owner: yeasy
    name: mdpress
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
